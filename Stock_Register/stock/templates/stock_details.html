<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Stock Details</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }
        .container {
            width: 90%;
            max-width: 800px;
            background: white;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            overflow-y: auto;
        }
        h1 {
            margin-bottom: 20px;
            text-align: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th, td {
            text-align: left;
            padding: 10px;
            border: 1px solid #ccc;
        }
        th {
            background-color: #f4f4f9;
        }
        .no-data {
            text-align: center;
            font-style: italic;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Stock Details</h1>
        <table id="stockTable">
            <thead>
                <tr>
                    <th>Product Name</th>
                    <th>Quantity</th>
                    <th>Price per Unit</th>
                    <th>Category</th>
                </tr>
            </thead>
            <tbody>
                <!-- Dynamic rows will be inserted here -->
                <tr class="no-data">
                    <td colspan="4">No stock details available</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        // Sample stock data for demonstration
        const stockData = [
            { productName: 'Laptop', quantity: 10, price: 800, category: 'Electronics' },
            { productName: 'Shirt', quantity: 50, price: 20, category: 'Clothing' },
            { productName: 'Apples', quantity: 100, price: 1, category: 'Groceries' }
        ];

        const tableBody = document.querySelector('#stockTable tbody');

        // Function to populate stock details
        function populateStockDetails(data) {
            tableBody.innerHTML = '';
            if (data.length === 0) {
                tableBody.innerHTML = '<tr class="no-data"><td colspan="4">No stock details available</td></tr>';
            } else {
                data.forEach(item => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${item.productName}</td>
                        <td>${item.quantity}</td>
                        <td>${item.price}</td>
                        <td>${item.category}</td>
                    `;
                    tableBody.appendChild(row);
                });
            }
        }

        // Populate table on page load
        populateStockDetails(stockData);
    </script>
</body>
</html>
